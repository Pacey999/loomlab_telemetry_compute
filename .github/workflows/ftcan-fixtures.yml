name: ftcan-fixtures

on:
  push:
    paths:
      - "tools/ftcan*.py"
      - "tools/ftcan2*.py"
      - "fixtures/ftcan/**"
      - "shared/protocol/ftcan2/**"
      - "xavier-gateway/**"
      - ".github/workflows/ftcan-fixtures.yml"
  pull_request:
    paths:
      - "tools/ftcan*.py"
      - "tools/ftcan2*.py"
      - "fixtures/ftcan/**"
      - "shared/protocol/ftcan2/**"
      - "xavier-gateway/**"
      - ".github/workflows/ftcan-fixtures.yml"

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Golden serial JSONL (no hardware)
        run: python3 tools/ftcan_verify_serial_fixture.py
      - name: Compare golden vs fingerprint
        run: python3 tools/ftcan_compare_session.py --capture fixtures/ftcan/serial_bench_golden.jsonl --fingerprint fixtures/ftcan/bench_fingerprint_golden.json
      - name: Python vs session decode parity
        run: python3 tools/ftcan_decode_parity.py --session fixtures/ftcan/serial_bench_golden.jsonl
      - name: Gateway replay determinism
        working-directory: xavier-gateway
        run: python3 test_replay_determinism.py
      - name: FTCAN 2.0 pipeline unit tests
        run: python3 -m unittest discover -s shared/protocol/ftcan2/tests -p 'test_*.py' -v
      - name: FTCAN 2.0 replay CLI (sample fixture)
        run: python3 tools/ftcan2_replay.py --session shared/protocol/ftcan2/fixtures/sample_session.jsonl >/tmp/ftcan2_replay.out && test "$(wc -l </tmp/ftcan2_replay.out)" -ge 3
