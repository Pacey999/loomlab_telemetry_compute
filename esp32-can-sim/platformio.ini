[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
upload_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Minimal two-stage CAN connectivity test (loopback + two-board bus link).
[env:loopback-test]
extends = env:esp32dev
monitor_speed = 115200
build_flags =
    ${env:esp32dev.build_flags}
    -DCAN_LOOPBACK_TEST=1
