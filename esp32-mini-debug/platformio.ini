; Default: two-node FTCAN bench (NORMAL + ACK). Use -e esp32dev for LISTEN_ONLY / single-node.
[platformio]
default_envs = bench-quiet

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Receiver build for esp32-can-sim two-board test (ACKs frames — required on 2-node bus).
[env:bench-pair]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DBENCH_TWO_NODE_ACK=1

; Same as bench-pair but no per-frame Serial (prevents UART saturation). Use for E2E FTCAN proof.
[env:bench-quiet]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DBENCH_TWO_NODE_ACK=1
    -DRX_SERIAL_QUIET=1
