; Full FTCAN decode (registry + decoder + segmentation) + generic header JSON.
; Default: LISTEN_ONLY @ 921600 (FT600 / vehicle-safe). Use env bench-pair for
; two-node ESP32↔sim (ACK).
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17
build_unflags = -std=gnu++11

[env:bench-pair]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DBENCH_TWO_NODE_ACK=1
